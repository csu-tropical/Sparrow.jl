name: Integration (live access)

# Live-access tests hit public NOAA S3 buckets (NEXRAD, RTMA, NBM, MRMS).
# They depend on third-party uptime and data retention, so they are
# intentionally NOT run on every push/PR — that produced flaky failures
# unrelated to code changes. Trigger this workflow manually from the
# Actions tab when you want a live-access regression check (e.g. before
# a release, or after touching src/data_sources.jl).

on:
  workflow_dispatch:

jobs:
  integration:
    name: Integration tests (Julia ${{ matrix.version }} - ${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    permissions:
      actions: write
      contents: read
    strategy:
      fail-fast: false
      matrix:
        version:
          - '1'
        os:
          - ubuntu-latest
        arch:
          - x64
    steps:
      - uses: actions/checkout@v4

      - uses: julia-actions/setup-julia@v2
        with:
          version: ${{ matrix.version }}
          arch: ${{ matrix.arch }}

      - uses: julia-actions/cache@v2

      - name: Install dependencies
        shell: julia --color=yes --project=test {0}
        run: |
          using Pkg
          Pkg.develop(url="https://github.com/csu-tropical/Daisho.jl")
          Pkg.develop(url="https://github.com/csu-tropical/Ronin.jl")
          Pkg.develop(url="https://github.com/csu-tropical/Sparrow.jl")
          Pkg.develop(PackageSpec(path=pwd()))
          Pkg.instantiate()

      - name: Run tests (with integration and distributed tests)
        env:
          SPARROW_RUN_INTEGRATION_TESTS: 1
          SPARROW_RUN_DISTRIBUTED_TESTS: 1
        run: julia --color=yes --project=test test/runtests.jl
