name: CI

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  test:
    name: Julia ${{ matrix.version }} - ${{ matrix.os }} - ${{ matrix.arch }}
    runs-on: ${{ matrix.os }}
    permissions:
      actions: write
      contents: read
    strategy:
      fail-fast: false
      matrix:
        version:
          - '1.10'  # LTS
          - '1'     # Latest stable
        os:
          - ubuntu-latest
        arch:
          - x64
    steps:
      - uses: actions/checkout@v4
      
      - uses: julia-actions/setup-julia@v2
        with:
          version: ${{ matrix.version }}
          arch: ${{ matrix.arch }}
      
      - uses: julia-actions/cache@v2
      
      - name: Install dependencies
        run: |
          julia --color=yes --project -e '
            using Pkg
            Pkg.develop(url="https://github.com/mmbell/Daisho.jl")
            Pkg.develop(url="https://github.com/csu-tropical/Ronin.jl")
            Pkg.instantiate()
          '
      
      - name: Build package
        run: julia --color=yes --project -e 'using Pkg; Pkg.build()'
      
      - name: Run tests (with integration tests)
        env:
          SPARROW_RUN_INTEGRATION_TESTS: 1
        run: julia --color=yes --project -e 'using Pkg; Pkg.test(coverage=true)'
      
      - uses: julia-actions/julia-processcoverage@v1
      
      - uses: codecov/codecov-action@v4
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          fail_ci_if_error: false